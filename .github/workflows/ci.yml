name: TokenOps CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Test
        working-directory: backend
        run: pytest tests/ -v
        env:
          DATABASE_URL: sqlite:///./test.db
          SECRET_KEY: test-secret-key-ci-runner-32chars!
          ENVIRONMENT: development

  sdk-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          pip install httpx pydantic loguru sqlalchemy pytest
          cd sdk && pip install -e .
      - name: Test
        working-directory: sdk
        run: pytest tests/ -v
